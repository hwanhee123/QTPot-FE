name: Frontend CI/CD

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 빌드
        run: npm run build

      - name: EC2 SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: dist 파일 EC2로 전송
        run: |
          scp -i ~/.ssh/deploy_key.pem -r dist \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/frontend-dist

      - name: nginx에 배포 및 설정 적용
        run: |
          ssh -i ~/.ssh/deploy_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          # 프론트 파일 배포
          sudo rm -rf /usr/share/nginx/html/*
          sudo cp -r /home/ec2-user/frontend-dist/* /usr/share/nginx/html/
          sudo chmod -R 755 /usr/share/nginx/html
          rm -rf /home/ec2-user/frontend-dist

          # nginx 설정: /api/ 요청을 백엔드(localhost:8080)로 프록시
          sudo tee /etc/nginx/conf.d/default.conf > /dev/null << 'NGINX'
          server {
              listen 80;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://localhost:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          NGINX

          sudo nginx -t && sudo systemctl reload nginx
          echo "Frontend deployed"
          EOF
